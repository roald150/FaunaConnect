<!DOCTYPE html>
<html>
<head>
    <title>Leaflet Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; touch-action: none; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map', {
            zoomControl: true,
            tap: false // Recommended for mobile to avoid double-tap issues
        }).setView([51.650, 5.050], 13);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        var currentParcelsLayers = [];
        var selectedParcelLayer = null;
        var currentCircle = null;
        var circleMarker = null;
        var huntingGroundLayers = [];
        var registrationLayers = [];
        var damageReportLayers = [];
        var currentPolygon = null;

        var circleVisible = false;
        var lastLat = null;
        var lastLng = null;

        var baseLayers = {
            "Kaart": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }),
            "Satelliet": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
            })
        };

        baseLayers["Kaart"].addTo(map);
        L.control.layers(baseLayers).addTo(map);

        map.on('click', function(e) {
            if (map.getZoom() < 16) return; // Klikken op percelen uitgeschakeld als je te ver uitgezoomed bent
            
            lastLat = e.latlng.lat;
            lastLng = e.latlng.lng;
            window.location.href = "invoke://mapclick?lat=" + lastLat + "&lng=" + lastLng;
        });

        map.on('moveend', function() {
            var zoom = map.getZoom();
            if (zoom >= 16) {
                var bounds = map.getBounds();
                var ne = bounds.getNorthEast();
                var sw = bounds.getSouthWest();
                window.location.href = `invoke://mapbounds?neLat=${ne.lat}&neLng=${ne.lng}&swLat=${sw.lat}&swLng=${sw.lng}`;
            } else {
                // Wis percelen als we te ver uitzoomen
                clearAllParcels();
            }
        });

        function clearAllParcels() {
            currentParcelsLayers.forEach(l => map.removeLayer(l));
            currentParcelsLayers = [];
            loadedParcelNumbers.clear();
            selectedParcelLayer = null;
        }

        async function searchLocation(query) {
            if (!query) return;

            try {
                var response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                var data = await response.json();
                if (data && data.length > 0) {
                    var result = data[0];
                    map.setView([result.lat, result.lon], 17); // Dieper inzoomen bij zoeken
                }
            } catch (error) {
                console.error('Search error:', error);
            }
        }

        function setCircleVisible(visible) {
            circleVisible = visible;
            if (!visible) {
                if (currentCircle) map.removeLayer(currentCircle);
                if (circleMarker) map.removeLayer(circleMarker);
                currentCircle = null;
                circleMarker = null;
            } else if (lastLat && lastLng) {
                drawCircle(lastLat, lastLng, 300);
            }
        }

        var loadedParcelNumbers = new Set();

        function drawParcels(parcels, selectedId, append) {
            if (!append) {
                currentParcelsLayers.forEach(l => {
                    if (l !== selectedParcelLayer) {
                        map.removeLayer(l);
                    }
                });
                currentParcelsLayers = [];
                loadedParcelNumbers.clear();
                if (selectedParcelLayer) {
                    currentParcelsLayers.push(selectedParcelLayer);
                    loadedParcelNumbers.add(selectedParcelLayer.parcelNumber);
                }
            }

            parcels.forEach(p => {
                if (loadedParcelNumbers.has(p.ParcelNumber)) {
                    // Als het geselecteerd is maar al bestaat, update de stijl
                    if (p.ParcelNumber === selectedId && selectedParcelLayer && selectedParcelLayer.parcelNumber === selectedId) {
                        // Reeds geselecteerd, niets doen
                    } else if (p.ParcelNumber === selectedId) {
                        // Bestaat al maar was niet geselecteerd, zoek de layer en update
                        var existingLayer = currentParcelsLayers.find(l => l.parcelNumber === p.ParcelNumber);
                        if (existingLayer) {
                            existingLayer.setStyle({
                                color: '#FFD700',
                                weight: 4,
                                fillColor: '#FFD700',
                                fillOpacity: 0.4
                            });
                            existingLayer.bringToFront();
                            selectedParcelLayer = existingLayer;
                        }
                    }
                    return;
                }

                var latlngs = p.Coordinates.map(c => [c.Latitude, c.Longitude]);
                var isSelected = p.ParcelNumber === selectedId;
                
                var layer = L.polygon(latlngs, {
                    color: isSelected ? '#FFD700' : '#666',
                    weight: isSelected ? 4 : 1,
                    fillColor: isSelected ? '#FFD700' : '#999',
                    fillOpacity: isSelected ? 0.4 : 0.1,
                    pane: isSelected ? 'markerPane' : 'overlayPane'
                }).addTo(map);

                layer.parcelNumber = p.ParcelNumber;

                layer.on('click', function(e) {
                    L.DomEvent.stopPropagation(e);
                    lastLat = e.latlng.lat;
                    lastLng = e.latlng.lng;
                    window.location.href = "invoke://mapclick?lat=" + e.latlng.lat + "&lng=" + e.latlng.lng;
                });

                currentParcelsLayers.push(layer);
                loadedParcelNumbers.add(p.ParcelNumber);

                if (isSelected) {
                    if (selectedParcelLayer && selectedParcelLayer !== layer) {
                        // De oude geselecteerde terug naar normale stijl als die nog bestaat
                        selectedParcelLayer.setStyle({
                            color: '#666',
                            weight: 1,
                            fillColor: '#999',
                            fillOpacity: 0.1
                        });
                    }
                    selectedParcelLayer = layer;
                }
            });
        }

        function drawHuntingGrounds(grounds) {
            huntingGroundLayers.forEach(layer => map.removeLayer(layer));
            huntingGroundLayers = [];

            grounds.forEach(ground => {
                var coords = JSON.parse(ground.PolygonCoordinatesJson);
                var latlngs = coords.map(c => [c.Latitude, c.Longitude]);
                var polygon = L.polygon(latlngs, {
                    color: '#2B5B2B',
                    weight: 2,
                    fillColor: '#2B5B2B',
                    fillOpacity: 0.3,
                    dashArray: '5, 10'
                }).addTo(map);
                
                polygon.bindPopup("<b>" + ground.Name + "</b><br>" + ground.TotalAreaInHectares.toFixed(2) + " ha");
                huntingGroundLayers.push(polygon);
            });
        }

        function drawRegistrations(registrations) {
            registrationLayers.forEach(layer => map.removeLayer(layer));
            registrationLayers = [];

            registrations.forEach(reg => {
                var marker = L.circleMarker([reg.Latitude, reg.Longitude], {
                    radius: 8,
                    fillColor: "#4CAF50",
                    color: "#FFF",
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map);

                marker.bindPopup("<b>🦌 " + reg.AnimalName + "</b><br>" + new Date(reg.DateTime).toLocaleString());
                registrationLayers.push(marker);
            });
        }

        function drawDamageReports(reports) {
            damageReportLayers.forEach(layer => map.removeLayer(layer));
            damageReportLayers = [];

            reports.forEach(report => {
                var marker = L.marker([report.Latitude, report.Longitude], {
                    icon: L.divIcon({
                        className: 'custom-div-icon',
                        html: "<div style='background-color:#B22222; color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border:2px solid white; box-shadow:0 0 5px rgba(0,0,0,0.5)'>⚠️</div>",
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map);

                var popupContent = "<b>⚠️ Wildschade</b><br>" + 
                                   (report.Description || "Geen omschrijving") + "<br>" +
                                   "<small>" + new Date(report.Timestamp).toLocaleString() + "</small>";
                
                marker.bindPopup(popupContent);
                damageReportLayers.push(marker);
            });
        }

        function drawCircle(lat, lng, radiusMeters) {
            if (currentCircle) {
                map.removeLayer(currentCircle);
            }
            if (circleMarker) {
                map.removeLayer(circleMarker);
            }

            currentCircle = L.circle([lat, lng], {
                color: '#d32f2f',
                weight: 1,
                fillColor: '#f44336',
                fillOpacity: 0.15,
                radius: radiusMeters,
                dashArray: '5, 5'
            }).addTo(map);

            // Voeg een versleepbare marker toe in het midden
            circleMarker = L.marker([lat, lng], {
                draggable: true,
                title: 'Versleep de cirkel'
            }).addTo(map);

            circleMarker.on('drag', function(e) {
                currentCircle.setLatLng(e.latlng);
            });
        }

        function clearMap() {
            if (currentPolygon) map.removeLayer(currentPolygon);
            if (currentCircle) map.removeLayer(currentCircle);
        }

        function deselectParcel() {
            if (selectedParcelLayer) {
                map.removeLayer(selectedParcelLayer);
                selectedParcelLayer = null;
            }
            // Ook andere tijdelijke percelen opschonen
            currentParcelsLayers.forEach(l => map.removeLayer(l));
            currentParcelsLayers = [];
        }
    </script>
</body>
</html>
